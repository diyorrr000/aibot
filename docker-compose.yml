version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tg_business_postgres
    restart: always
    environment:
      POSTGRES_USER: tg_user
      POSTGRES_PASSWORD: tg_password
      POSTGRES_DB: tg_business_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  bot:
    build: .
    container_name: tg_business_bot
    restart: always
    depends_on:
      - postgres
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DATABASE_URL: postgresql+asyncpg://tg_user:tg_password@postgres:5432/tg_business_db
      GEMINI_MODEL: gemini-2.5-flash-lite
      RATE_LIMIT_SECONDS: 1.5

volumes:
  pgdata:
